# Strings for PhET's Quantum Bound States simulation

# Simulation Title
quantum-bound-states.title:                 Quantum Bound States

# Screen Names
screen.oneWell:                             One Well
screen.superposition:                       Superposition
screen.twoWells:                            Two Wells
screen.manyWells:                           Many Wells

# Preferences
phaseFeatureControl:
  label:       Wave Function Phase
  description: Adds a Phase checkbox to control panels for showing and hiding the phase of the wave function.

# Titles
potentialEnergy:                            Potential Energy
totalEnergy:                                Total Energy
position_nm:                                Position (nm)
energy_eV:                                  Energy (eV)
averageProbabilityDensityOfBand:            Average Probability<br>Density of Band
probabilityDensity:                         Probability Density
waveFunction:                               Wave Function
quantumStateGraph:                          Quantum State Graph
energyDiagram:                              Energy Diagram

# Buttons
functionDetailsButton:
  averageProbabilityDensityOfBand: '|Ψ(x,t)|<sup>2</sup> = ...'
  probabilityDensity:              '|Ψ(x,t)|<sup>2</sup> = ...'
  waveFunction:                    'Ψ(x,t) = ...'

# Checkboxes
values:                                     Values
realPart:                                   Real Part
imaginaryPart:                              Imaginary Part
magnitude:                                  Magnitude
phase:                                      Phase
magnifier:                                  Magnifier
referenceLine:                              Reference Line

# ComboBoxes
superpositionLabel:                         Superposition

# Dialogs
averageProbabilityDensityOfBandDialogTitle: Average Probability Density of Band
probabilityDensityDialogTitle:              Probability Density
waveFunctionDialogTitle:                    Wave Function
superpositionDetailsDialogTitle:            Superposition Details
superpositionCustomizationDialogTitle:      Superposition Customization

# Sliders
mass:                                       Mass
numberOfWells:                              Number of Wells
electricField:                              Electric Field
slow:                                       slow
fast:                                       fast

# Spinners
energyLevel:                                Energy Level
energyLevelPattern:                         E<sub>{{index}}</sub>

# Toggles and Switches
preset:                                     Preset
custom:                                     Custom

# Units
units:
  electronMasses:
    symbol:        m<sub>e</sub>
    symbolPattern: '{{value}} m<sub>e</sub>'
  electronVolts:
    symbol:        eV
    symbolPattern: '{{value}} eV'
  femtoSeconds:
    symbol:        fs
    symbolPattern: '{{value}} fs'
  voltsPerNanometer:
    symbol:        V/nm
    symbolPattern: '{{value}} V/nm'

# Potential Wells
potentialWells:
  finiteSquare:         Finite Square
  infiniteSquare:       Infinite Square
  doubleSquare:         Double Square
  asymmetricTriangle:   Asymmetric Triangle
  harmonicOscillator:   Harmonic Oscillator
  anharmonicOscillator: Anharmonic Oscillator
  coulomb:              Coulomb
  infiniteStep:         Infinite Step

# Preset superposition states
localizedParticle:                          Localized Particle

# Custom superposition states
custom1:                                    Custom 1
custom2:                                    Custom 2
custom3:                                    Custom 3
custom4:                                    Custom 4
custom5:                                    Custom 5

# Magnifier
magnificationPower:                         '{{value}}×'

# Keyboard Help
keyboardHelp:
  referenceLine:
    heading: Reference Line

# Strings that are specific to accessibility
