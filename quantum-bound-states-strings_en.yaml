# Strings for PhET's Quantum Bound States simulation

# Simulation Title
quantum-bound-states.title:                 Quantum Bound States

# Screen Names
screen.oneWell:                             One Well
screen.superposition:                       Superposition
screen.twoWells:                            Two Wells
screen.manyWells:                           Many Wells

# Preferences
phaseFeatureControl:
  label:       Wave Function Phase
  description: Adds a Phase checkbox to control panels for showing and hiding the phase of the wave function.

# Titles
potentialEnergy:                            Potential Energy
totalEnergy:                                Total Energy
position_nm:                                Position (nm)
energy_eV:                                  Energy (eV)
averageProbabilityDensityOfBand:            Average Probability<br>Density of Band
probabilityDensity:                         Probability Density
waveFunction:                               Wave Function
quantumStateGraph:                          Quantum State Graph
energyDiagram:                              Energy Diagram

# Buttons
probabilityDensityDetailsButton:            '|Ψ(x,t)|<sup>2</sup> = ...'
waveFunctionDetailsButton:                  'Ψ(x,t) = ...'

# Checkboxes
values:                                     Values
realPart:                                   Real Part
imaginaryPart:                              Imaginary Part
magnitude:                                  Magnitude
phase:                                      Phase
magnifier:                                  Magnifier
referenceLine:                              Reference Line

# ComboBoxes
superposition:                              Superposition

# Dialogs
averageProbabilityDensityOfBandDialogTitle: Average Probability Density of Band
probabilityDensityDialogTitle:              Probability Density
waveFunctionDialogTitle:                    Wave Function
superpositionDetailsDialogTitle:            Superposition Details
superpositionCustomizationDialogTitle:      Superposition Customization

# Sliders
mass:                                       Mass
numberOfWells:                              Number of Wells
electricField:                              Electric Field
slow:                                       slow
fast:                                       fast

# Spinners
energyLevel:                                Energy Level
energyLevelPattern:                         E<sub>{{index}}</sub>

# Toggles and Switches
preset:                                     Preset
custom:                                     Custom

# Units
units:
  electronMasses:
    symbol:        m<sub>e</sub>
    symbolPattern: '{{value}} m<sub>e</sub>'
  electronVolts:
    symbol:        eV
    symbolPattern: '{{value}} eV'
  femtoSeconds:
    symbol:        fs
    symbolPattern: '{{value}} fs'
  voltsPerNanometer:
    symbol:        V/nm
    symbolPattern: '{{value}} V/nm'

# Potential Wells
potentialWells:
  finiteSquare:         Finite Square
  infiniteSquare:       Infinite Square
  doubleSquare:         Double Square
  asymmetricTriangle:   Asymmetric Triangle
  harmonicOscillator:   Harmonic Oscillator
  anharmonicOscillator: Anharmonic Oscillator
  morse:                Morse
  coulomb:              Coulomb
  infiniteStep:         Infinite Step

# Superposition configurations
superpositionConfigurations:
  groundState0:
    preset1: cΨ<sub>0</sub> + cΨ<sub>1</sub>
    preset2: cΨ<sub>0</sub> + cΨ<sub>2</sub>
    preset3: cΨ<sub>0</sub> - cΨ<sub>1</sub>
    preset4: cΨ<sub>0</sub> + cΨ<sub>1</sub> + cΨ<sub>2</sub>
  groundState1:
    preset1: cΨ<sub>1</sub> + cΨ<sub>2</sub>
    preset2: cΨ<sub>1</sub> + cΨ<sub>3</sub>
    preset3: cΨ<sub>1</sub> - cΨ<sub>2</sub>
    preset4: cΨ<sub>1</sub> + cΨ<sub>2</sub> + cΨ<sub>3</sub>
  preset5: Localized Particle
  custom1: Custom 1
  custom2: Custom 2
  custom3: Custom 3
  custom4: Custom 4
  custom5: Custom 5

# Magnifier
magnificationPower:                         '{{value}}×'

# Keyboard Help
keyboardHelp:
  referenceLine:
    heading: Reference Line

# Strings that are specific to accessibility
a11y:

  #=======================================================================================================
  # Screens (screen summaries, screen buttons)
  #=======================================================================================================

  screens:

    oneWellScreen:
      screenButtonsHelpText: Explore bound states in various single well potentials.
      screenSummary:
        playArea:        TODO.oneWellScreen.screenSummary.playArea
        controlArea:     TODO.oneWellScreen.screenSummary.controlArea
        currentDetails:  TODO.oneWellScreen.screenSummary.currentDetails
        interactionHint: TODO.oneWellScreen.screenSummary.interactionHint

    twoWellsScreen:
      screenButtonsHelpText: Explore bound states and molecular bonding in two closely separated potentials.
      screenSummary:
        playArea:        TODO.twoWellsScreen.screenSummary.playArea
        controlArea:     TODO.twoWellsScreen.screenSummary.controlArea
        currentDetails:  TODO.twoWellsScreen.screenSummary.currentDetails
        interactionHint: TODO.twoWellsScreen.screenSummary.interactionHint

    manyWellsScreen:
      screenButtonsHelpText: Explore bound states and band structure in a periodic array of potential potentials.
      screenSummary:
        playArea:        TODO.manyWellsScreen.screenSummary.playArea
        controlArea:     TODO.manyWellsScreen.screenSummary.controlArea
        currentDetails:  TODO.manyWellsScreen.screenSummary.currentDetails
        interactionHint: TODO.manyWellsScreen.screenSummary.interactionHint

    superpositionScreen:
      screenButtonsHelpText: Explore superposition states and their time-dependent behavior in various potentials.
      screenSummary:
        playArea:        TODO.superpositionScreen.screenSummary.playArea
        controlArea:     TODO.superpositionScreen.screenSummary.controlArea
        currentDetails:  TODO.superpositionScreen.screenSummary.currentDetails
        interactionHint: TODO.superpositionScreen.screenSummary.interactionHint

  #=======================================================================================================
  # Headings
  #=======================================================================================================

  energyDiagramControls:
    accessibleHeading: Energy Diagram Controls

  quantumStateGraphControls:
    accessibleHeading: Quantum State Graph Controls

  waveFunctionParts:
    accessibleHeading: Wave Function Parts

  timeControls:
    accessibleHeading: Time Controls

  toolControls:
    accessibleHeading: Tool Controls

  #=======================================================================================================
  # Checkboxes
  #=======================================================================================================

  valuesCheckbox:
    accessibleHelpText:                 Keep values visible for handles and sliders.
    accessibleContextResponseChecked:   Values stay visible.
    accessibleContextResponseUnchecked: Values shown on focus.

  realPartCheckbox:
    accessibleHelpText:                 Show or hide real part of wave function.
    accessibleContextResponseChecked:   Real part shown.
    accessibleContextResponseUnchecked: Real part hidden.

  imaginaryPartCheckbox:
    accessibleHelpText:                 Show or hide imaginary part of wave function.
    accessibleContextResponseChecked:   Imaginary part shown.
    accessibleContextResponseUnchecked: Imaginary part hidden.

  magnitudeCheckbox:
    accessibleHelpText:                 Show or hide magnitude of wave function.
    accessibleContextResponseChecked:   Magnitude shown.
    accessibleContextResponseUnchecked: Magnitude hidden.

  phaseCheckbox:
    accessibleHelpText:                 Show or hide phase of wave function.
    accessibleContextResponseChecked:   Phase shown.
    accessibleContextResponseUnchecked: Phase hidden.

  magnifierCheckbox:
    accessibleHelpText:                 Show or hide magnifier.
    accessibleContextResponseChecked:   Magnifier shown.
    accessibleContextResponseUnchecked: Magnifier hidden.

  referenceLineCheckbox:
    accessibleHelpText:                 Show or hide vertical Reference Line across Energy Diagram and Quantum State Graph.
    accessibleContextResponseChecked:   Reference Line shown.
    accessibleContextResponseUnchecked: Reference Line hidden.

  #=======================================================================================================
  # ComboBoxes
  #=======================================================================================================

  potentialComboBox:
    accessibleName:     Potential
    accessibleHelpText: Choose a potential shape for Energy Diagram.

  superpositionPresetComboBox:
    accessibleName:     Superposition Preset
    accessibleHelpText: TODO.superpositionPresetComboBox.accessibleHelpText

  superpositionCustomComboBox:
    accessibleName:     Superposition Custom
    accessibleHelpText: TODO.superpositionCustomComboBox.accessibleHelpText
    groundState0:
      accessibleNamePreset1: c times psi sub 0 plus c times psi sub 1
      accessibleNamePreset2: c times psi sub 0 plus c times psi sub 2
      accessibleNamePreset3: c times psi sub 0 minus c times psi sub 1
      accessibleNamePreset4: c times psi sub 0 plus c times psi sub 1 plus c times psi sub 2
    groundState1:
      accessibleNamePreset1: c times psi sub 1 plus c times psi sub 2
      accessibleNamePreset2: c times psi sub 1 plus c times psi sub 3
      accessibleNamePreset3: c times psi sub 1 minus c times psi sub 2
      accessibleNamePreset4: c times psi sub 1 plus c times psi sub 2 plus c times psi sub 3

  #=======================================================================================================
  # Graphs
  #=======================================================================================================

  energyDiagram:
    accessibleHeading:   Energy Diagram
    accessibleParagraph: TODO.energyDiagram.accessibleParagraph

  graphs:

    averageProbabilityDensityOfBandGraph:
      accessibleHeading:   Average Probability Density of Band Graph
      accessibleParagraph: TODO.averageProbabilityDensityOfBandGraph.accessibleParagraph

    probabilityDensityGraph:
      accessibleHeading:   Probability Density Graph
      accessibleParagraph: TODO.probabilityDensityGraph.accessibleParagraph

    waveFunctionGraph:
      accessibleHeading:   Wave Function Graph
      accessibleParagraph: TODO.waveFunctionGraph.accessibleParagraph

  #=======================================================================================================
