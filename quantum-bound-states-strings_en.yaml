# Strings for PhET's Quantum Bound States simulation

# Simulation Title
quantum-bound-states.title:      Quantum Bound States

# Screen Names
screen.oneWell:                  One Well
screen.superposition:            Superposition
screen.twoWells:                 Two Wells
screen.manyWells:                Many Wells

# Preferences
phaseFeatureControl:
  label:       Wave Function Phase
  description: Adds a Phase checkbox to control panels for showing and hiding the phase of the wave function.

# Titles
potentialEnergy:                 Potential Energy
totalEnergy:                     Total Energy
position_nm:                     Position (nm)
energy_eV:                       Energy (eV)
averageProbabilityDensityOfBand: Average Probability<br>Density of Band
probabilityDensity:              Probability Density
waveFunction:                    Wave Function
display:                         Display
properties:                      Properties

# Checkboxes
valueLabels:                     Value Labels
realPart:                        Real Part
imaginaryPart:                   Imaginary Part
magnitude:                       Magnitude
phase:                           Phase
magnifierTool:                   Magnifier Tool
referenceLine:                   Reference Line

# Sliders
mass:                            Mass

# Spinners
energyLevel:                     Energy Level

# Units
units:
  # TODO: Move electronMass to scenery-phet-strings_en.yaml
  electronMass:
    symbol:        m<sub>e</sub>
    symbolPattern: '{{value}} m<sub>e</sub>'

