# Strings for PhET's Quantum Bound States simulation

# Simulation Title
quantum-bound-states.title:            Quantum Bound States

# Screen Names
screen.oneWell:                        One Well
screen.superposition:                  Superposition
screen.twoWells:                       Two Wells
screen.manyWells:                      Many Wells

# Preferences
phaseFeatureControl:
  label:       Wave Function Phase
  description: Adds a Phase checkbox to control panels for showing and hiding the phase of the wave function.

# Titles
potentialEnergy:                       Potential Energy
totalEnergy:                           Total Energy
position_nm:                           Position (nm)
energy_eV:                             Energy (eV)
averageProbabilityDensityOfBand:       Average Probability<br>Density of Band
probabilityDensity:                    Probability Density
waveFunction:                          Wave Function
display:                               Display
properties:                            Properties
probabilityDensityFunction:            Probability Density Function

# Buttons
probabilityDensityFunctionButtonLabel: '|Ψ(x,t)|<sup>2</sup> = ...'
waveFunctionButtonLabel:               'Ψ(x,t) = ...'

# Checkboxes
valueLabels:                           Value Labels
realPart:                              Real Part
imaginaryPart:                         Imaginary Part
magnitude:                             Magnitude
phase:                                 Phase
magnifier:                             Magnifier
referenceLine:                         Reference Line

# Sliders
mass:                                  Mass
normal:                                normal
fast:                                  fast

# Spinners
energyLevel:                           Energy Level
energyLevelPattern:                    E<sub>{{index}}</sub>

# Units
units:
  electronMasses:
    symbol:        m<sub>e</sub>
    symbolPattern: '{{value}} m<sub>e</sub>'
  electronVolts:
    symbol:        eV
    symbolPattern: '{{value}} eV'
  femtoSeconds:
    symbol:        fs
    symbolPattern: '{{value}} fs'

# Potential Wells
potentialWells:
  finiteSquare:         Finite Square
  infiniteSquare:       Infinite Square
  asymmetricTriangle:   Asymmetric Triangle
  harmonicOscillator:   Harmonic Oscillator
  anharmonicOscillator: Anharmonic Oscillator
  coulomb:              Coulomb
  infiniteStep:         Infinite Step

# Strings that are specific to accessibility
a11y:

  #=======================================================================================================
  # Screens (screen summaries, screen buttons)
  #=======================================================================================================

  screens:

    oneWellScreen:
      screenButtonsHelpText: Explore bound states in various single well potentials.
      screenSummary:
        playArea:        TODO.oneWellScreen.screenSummary.playArea
        controlArea:     TODO.oneWellScreen.screenSummary.controlArea
        currentDetails:  TODO.oneWellScreen.screenSummary.currentDetails
        interactionHint: TODO.oneWellScreen.screenSummary.interactionHint

    twoWellsScreen:
      screenButtonsHelpText: Explore bound states and molecular bonding in two closely separated potentials.
      screenSummary:
        playArea:        TODO.twoWellsScreen.screenSummary.playArea
        controlArea:     TODO.twoWellsScreen.screenSummary.controlArea
        currentDetails:  TODO.twoWellsScreen.screenSummary.currentDetails
        interactionHint: TODO.twoWellsScreen.screenSummary.interactionHint

    manyWellsScreen:
      screenButtonsHelpText: Explore bound states and band structure in a periodic array of potential potentials.
      screenSummary:
        playArea:        TODO.manyWellsScreen.screenSummary.playArea
        controlArea:     TODO.manyWellsScreen.screenSummary.controlArea
        currentDetails:  TODO.manyWellsScreen.screenSummary.currentDetails
        interactionHint: TODO.manyWellsScreen.screenSummary.interactionHint

    superpositionScreen:
      screenButtonsHelpText: Explore superposition states and their time-dependent behavior in various potentials.
      screenSummary:
        playArea:        TODO.superpositionScreen.screenSummary.playArea
        controlArea:     TODO.superpositionScreen.screenSummary.controlArea
        currentDetails:  TODO.superpositionScreen.screenSummary.currentDetails
        interactionHint: TODO.superpositionScreen.screenSummary.interactionHint

  #=======================================================================================================
  # Headings
  #=======================================================================================================

  controlPanel:
    accessibleHeading: Control Panel

  waveFunctionParts:
    accessibleHeading: Wave Function Parts

  timeControls:
    accessibleHeading: Time Controls

  toolControls:
    accessibleHeading: Tool Controls

  #=======================================================================================================
  # Checkboxes
  #=======================================================================================================

  valueLabelsCheckbox:
    accessibleHelpText:                 Keep value labels visible for handles and sliders.
    accessibleContextResponseChecked:   Value labels stay visible.
    accessibleContextResponseUnchecked: Value labels shown on focus.

  realPartCheckbox:
    accessibleHelpText:                 Show or hide the real part of the wave function.
    accessibleContextResponseChecked:   Real part shown.
    accessibleContextResponseUnchecked: Real part hidden.

  imaginaryPartCheckbox:
    accessibleHelpText:                 Show or hide the imaginary part of the wave function.
    accessibleContextResponseChecked:   Imaginary part shown.
    accessibleContextResponseUnchecked: Imaginary part hidden.

  magnitudeCheckbox:
    accessibleHelpText:                 Show or hide the magnitude of the wave function.
    accessibleContextResponseChecked:   Magnitude shown.
    accessibleContextResponseUnchecked: Magnitude hidden.

  phaseCheckbox:
    accessibleHelpText:                 Show or hide the phase of the wave function.
    accessibleContextResponseChecked:   Phase shown.
    accessibleContextResponseUnchecked: Phase hidden.

  magnifierCheckbox:
    accessibleHelpText:                 Show or hide the magnifier.
    accessibleContextResponseChecked:   Magnifier shown.
    accessibleContextResponseUnchecked: Magnifier hidden.

  referenceLineCheckbox:
    accessibleHelpText:                 TODO.referenceLineCheckbox.accessibleHelpText
    accessibleContextResponseChecked:   Reference Line shown.
    accessibleContextResponseUnchecked: Reference Line hidden.

  #=======================================================================================================
  # Dialogs
  #=======================================================================================================

  probabilityDensityFunctionDialog:
    accessibleName: Probability Density Function Dialog

  waveFunctionDialog:
    accessibleName: Wave Function Dialog

  #=======================================================================================================
  # Graphs
  #=======================================================================================================

  graphs:

    energyGraph:
      accessibleHeading:   Energy Graph
      accessibleParagraph: TODO.energyGraph.accessibleParagraph

    averageProbabilityDensityGraph:
      accessibleHeading:   Average Probability Density Graph
      accessibleParagraph: TODO.averageProbabilityDensityGraph.accessibleParagraph

    probabilityDensityGraph:
      accessibleHeading:   Probability Density Graph
      accessibleParagraph: TODO.probabilityDensityGraph.accessibleParagraph

    waveFunctionGraph:
      accessibleHeading:   Wave Function Graph
      accessibleParagraph: TODO.waveFunctionGraph.accessibleParagraph

  #=======================================================================================================
  # Push Buttons
  #=======================================================================================================

  timeButtonGroup:
    accessibleHeading:  Time Buttons
    accessibleHelpText: TODO.timeButtonGroup.accessibleHelpText

  restartButton:
    accessibleHelpText:        TODO.restartButton.accessibleHelpText
    accessibleContextResponse: TODO.restartButton.accessibleContextResponse

  playPauseButton:
    accessibleHelpTextPlaying: TODO.playPauseButton.accessibleHelpTextPlaying
    accessibleHelpTextPaused:  TODO.playPauseButton.accessibleHelpTextPaused

  stepForwardButton:
    accessibleHelpText:        TODO.stepForwardButton.accessibleHelpText
    accessibleContextResponse: TODO.stepForwardButton.accessibleContextResponse

  probabilityDensityFunctionButton:
    accessibleName:            TODO.probabilityDensityFunctionButton.accessibleName
    accessibleHelpText:        TODO.probabilityDensityFunctionButton.accessibleHelpText
    accessibleContextResponse: TODO.probabilityDensityFunctionButton.accessibleContextResponse

  waveFunctionButton:
    accessibleName:            TODO.waveFunctionButton.accessibleName
    accessibleHelpText:        TODO.waveFunctionButton.accessibleHelpText
    accessibleContextResponse: TODO.waveFunctionButton.accessibleContextResponse

  #=======================================================================================================
  # Radio Buttons
  #=======================================================================================================

  # Radio buttons for selecting which graph to display at the bottom of the screen.
  graphTypeRadioButtonGroup:
    accessibleName:     Graph Type
    accessibleHelpText: TODO.graphTypeRadioButtonGroup.accessibleHelpText

  #=======================================================================================================
  # Sliders
  #=======================================================================================================

  massControl:
    accessibleHelpText: Adjust the relative mass of the system.

  #=======================================================================================================
  # Spinners
  #=======================================================================================================

  energyLevelSpinner:
    accessibleName:     Energy Level
    accessibleHelpText: TODO.energyLevelSpinner.accessibleHelpText

  #=======================================================================================================
  # Toggle Buttons
  #=======================================================================================================

  timeDisplayToggleButton:
    accessibleNameOn:             Hide Time Display
    accessibleNameOff:            Show Time Display
    accessibleHelpText:           TODO.timeDisplayToggleButton.accessibleHelpText
    accessibleContextResponseOn:  Time display shown.
    accessibleContextResponseOff: Time display hidden.

  probabilityDensityToggleButton:
    accessibleNameOn:             TODO.probabilityDensityToggleButton.accessibleNameOn
    accessibleNameOff:            TODO.probabilityDensityToggleButton.accessibleNameOff
    accessibleHelpTextOn:         TODO.probabilityDensityToggleButton.accessibleHelpTextOn
    accessibleHelpTextOff:        TODO.probabilityDensityToggleButton.accessibleHelpTextOff
    accessibleContextResponseOn:  TODO.probabilityDensityToggleButton.accessibleContextResponseOn
    accessibleContextResponseOff: TODO.probabilityDensityToggleButton.accessibleContextResponseOff

  waveFunctionToggleButton:
    accessibleNameOn:             TODO.waveFunctionToggleButton.accessibleNameOn
    accessibleNameOff:            TODO.waveFunctionToggleButton.accessibleNameOff
    accessibleHelpTextOn:         TODO.waveFunctionToggleButton.accessibleHelpTextOn
    accessibleHelpTextOff:        TODO.waveFunctionToggleButton.accessibleHelpTextOff
    accessibleContextResponseOn:  TODO.waveFunctionToggleButton.accessibleContextResponseOn
    accessibleContextResponseOff: TODO.waveFunctionToggleButton.accessibleContextResponseOff

  #=======================================================================================================
  # Tools
  #=======================================================================================================

  magnifierTool:
    accessibleHeading:   Magnifier Tool
    accessibleParagraph: TODO.magnifierTool.accessibleParagraph
    probe:
      accessibleName:           Magnifier Tool Probe
      accessibleHelpText:       TODO.magnifierTool.probe.accessibleHelpText
      accessibleObjectResponse: TODO.magnifierTool.probe.accessibleObjectResponse

  referenceLine:
