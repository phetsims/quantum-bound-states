    accessibleParagraph: TODO.referenceLine.accessibleParagraph
    handle:
      accessibleName:           Reference Line Handle
      accessibleHelpText:       TODO.referenceLineHandle.accessibleHelpText
      accessibleObjectResponse: TODO.referenceLineHandle.accessibleObjectResponse

  #=======================================================================================================
  # Potentials
  #=======================================================================================================

  potentialTypeComboBox:
    accessibleName:            Potential Type
    accessibleHelpText:        Choose a potential shape for the energy graph.
    accessibleContextResponse: potential set to {$potentialType}

  #=======================================================================================================
  # Units
  #=======================================================================================================

  units:
    electronMasses:
      pattern: '{$value} times electron mass'
    electronVolts:
      pattern: '{$value} eV'
    femtoseconds:
      pattern: '{$value} fs'